{{- if and .Values.application.prometheusScrape.independentDeployment .Values.application.prometheusScrape.targetAllocator.enabled (not .Values.node.metrics.cadvisor.separate_pipeline) }}
{{- $ta := .Values.application.prometheusScrape.targetAllocator -}}
{{- $crEnabled := and $ta.prometheusCR $ta.prometheusCR.enabled -}}
{{- if and (not $crEnabled) (not $ta.includeStaticScrapeConfigs) -}}
{{- fail "application.prometheusScrape.targetAllocator: at least one of prometheusCR.enabled or includeStaticScrapeConfigs must be true; otherwise the Target Allocator has no scrape configs to serve" -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-ta
  namespace: {{ template "observe-agent.namespace" . }}
data:
  targetallocator.yaml: |
    allocation_strategy: consistent-hashing
    filter_strategy: relabel-config
    prometheus_cr:
      enabled: {{ $crEnabled }}
{{- if $crEnabled }}
      # service_monitor_selector and pod_monitor_selector must be present
      # (even empty) — TA treats omitted label selectors as "match nothing".
      # Namespace selectors are only emitted when non-empty; TA defaults to
      # all-namespaces when they're absent.
      service_monitor_selector: {{ toYaml ($ta.prometheusCR.serviceMonitorSelector | default dict) | nindent 8 }}
      pod_monitor_selector: {{ toYaml ($ta.prometheusCR.podMonitorSelector | default dict) | nindent 8 }}
      {{- with $ta.prometheusCR.serviceMonitorNamespaceSelector }}
      service_monitor_namespace_selector: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with $ta.prometheusCR.podMonitorNamespaceSelector }}
      pod_monitor_namespace_selector: {{ toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
    collector_selector:
      matchlabels:
        app.kubernetes.io/name: prometheus-scraper
{{- if $ta.includeStaticScrapeConfigs }}
    config:
      scrape_configs:
{{ include "observe.prometheus.pod_metrics.scrape_job" . | nindent 8 }}
{{- if .Values.node.metrics.cadvisor.enabled }}
{{ include "observe.prometheus.cadvisor.scrape_job" . | nindent 8 }}
{{- end }}
{{- end }}
{{- end }}
