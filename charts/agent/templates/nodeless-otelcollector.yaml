{{- if .Values.nodeless.enabled }}
{{- if eq .Values.nodeless.hostingPlatform "fargate" }}
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: fargate-collector
spec:
  mode: sidecar
  image: "ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.141.0"
  env:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: OTEL_K8S_POD_UID
      valueFrom:
        fieldRef:
          fieldPath: metadata.uid
    - name: OTEL_K8S_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    - name: OBSERVE_CLUSTER_NAME
      value: "{{ .Values.cluster.name }}"
    - name: OBSERVE_CLUSTER_UID
      valueFrom:
        configMapKeyRef:
          name: cluster-info
          key: id
    - name: OBSERVE_OTEL_ENDPOINT
      value: "{{ trimSuffix "/" .Values.observe.collectionEndpoint.value }}/v2/otel"
    - name: OBSERVE_PROMETHEUS_ENDPOINT
      value: "{{ trimSuffix "/" .Values.observe.collectionEndpoint.value }}/v1/prometheus"
    # The sidecar runs the vanilla otel-collector image (no observe-agent
    # wrapper), so unlike the chart's standalone collectors there is nothing
    # at startup to derive OBSERVE_AUTHORIZATION_HEADER from observe_url + token.
    # Construct it here: prefer the inlined helm value when set, otherwise
    # source the token from the agent-credentials secret. Sidecar pods running
    # in workload namespaces need that secret present in the same namespace
    # (Kubernetes does not support cross-namespace secret refs).
    {{- if .Values.observe.token.value }}
    - name: OBSERVE_AUTHORIZATION_HEADER
      value: "Bearer {{ .Values.observe.token.value }}"
    {{- else }}
    - name: OBSERVE_TOKEN
      valueFrom:
        secretKeyRef:
          name: agent-credentials
          key: OBSERVE_TOKEN
          optional: true
    - name: OBSERVE_AUTHORIZATION_HEADER
      value: "Bearer $(OBSERVE_TOKEN)"
    {{- end }}
  config:
    {{- include "observe.sidecar.applyFargateSidecarConfig" . | nindent 4 }}
  initContainers:
    - name: kube-cluster-info
      image: observeinc/kube-cluster-info:v0.11.6
      imagePullPolicy: Always
      env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
    {{- if .Values.nodeless.logs.enabled }}
    - name: logging-sidecar
      restartPolicy: Always
      image: alpine/k8s:1.28.3
      resources:
        requests:
          memory: 100Mi
          cpu: 100m
        limits:
          memory: 100Mi
      command: ["/bin/sh", "-c"]
      args:
        - |
          apk add --no-cache logrotate curl

          {{- if not .Values.nodeless.logs.containerNameFromFile }}
          # Get the first container name
          APP_CONTAINER=$(kubectl get pod "$POD_NAME" -n "$POD_NAMESPACE" \
            -o jsonpath='{.spec.containers[0].name}')

          echo "Detected app container: $APP_CONTAINER"
          echo -n "$APP_CONTAINER" > /applogs/app-container-name.txt
          {{- end }}

          # Create logrotate config inline
          # size and rotation should keep total memory usage < 5Mi per container
          # compression helps keep the size down
          # delaycompress, copytruncate to prevent concurrency issues with applications writing to the log file
          # missingok to suppress errors in case application has not written to the log file yet
          # notifempty to prevent logrotate from creating a new file if the log file is empty
          # su root root to grant logrotate permission to rotate the log file
          cat > /etc/logrotate.conf << 'EOF'
          /applogs/*.log {
              size 1M
              rotate 5
              compress
              delaycompress
              missingok
              notifempty
              copytruncate
              dateext
              su root root
              dateformat -%Y%m%d-%H%M%S
          }
          EOF

          # Run logrotate
          while true; do
            logrotate -v /etc/logrotate.conf
            sleep 60
          done
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: K8S_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
      volumeMounts:
        - name: log-storage
          mountPath: /applogs
          readOnly: false
    {{- end }}

  {{- if .Values.nodeless.logs.enabled }}
  volumeMounts:
    - name: log-storage
      mountPath: /applogs
      readOnly: false
  {{- end }}
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 150m
      memory: 256Mi
{{- else }}
{{- fail (printf "Invalid nodeless.hostingPlatform, valid values are 'fargate', provided value is %s" .Values.nodeless.hostingPlatform) }}
{{- end }}
{{- end }}
