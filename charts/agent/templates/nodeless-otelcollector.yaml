{{- if .Values.nodeless.enabled }}
{{- if eq .Values.nodeless.hostingPlatform "fargate" }}
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: fargate-collector
spec:
  mode: sidecar
  image: "ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:latest"
  env:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: K8S_POD_ID
      valueFrom:
        fieldRef:
          fieldPath: metadata.uid
    - name: K8S_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    - name: OBSERVE_CLUSTER_NAME
      value: "{{ .Values.cluster.name }}"
    - name: OBSERVE_CLUSTER_UID
      valueFrom:
        configMapKeyRef:
          name: cluster-info
          key: id
    - name: OBSERVE_OTEL_ENDPOINT
      value: "{{ .Values.observe.collectionEndpoint.value }}v2/otel"
    - name: OBSERVE_PROMETHEUS_ENDPOINT
      value: "{{ .Values.observe.collectionEndpoint.value }}v1/prometheus"
    - name: OBSERVE_AUTHORIZATION_HEADER
      value: "Bearer {{ .Values.observe.token.value }}"
  config:
    {{- include "observe.sidecar.applyFargateSidecarConfig" . | nindent 4 }}
  initContainers:
    - name: kube-cluster-info
      image: observeinc/kube-cluster-info:v0.11.5
      imagePullPolicy: Always
      env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
    {{- if and .Values.nodeless.logs.enabled (not .Values.nodeless.logs.containerNameFromFile) }}
    - name: app-container-info
      image: bitnami/kubectl:latest
      command: ["/bin/sh", "-c"]
      args:
      - |
        #!/bin/sh

        # Sidecars to exclude (space-separated list)
        SIDECARS="cleanup-sidecar otc-container"

        # Get container names (space-separated), convert to newline-separated
        CONTAINERS=$(kubectl get pod "$HOSTNAME" -n "$NAMESPACE" \
          -o jsonpath='{.spec.containers[*].name}' | tr ' ' '\n')

        APP_CONTAINER=""

        for c in $CONTAINERS; do
            SKIP="false"

            # Check if this container is in the sidecar list
            for sidecar in $SIDECARS; do
                if [ "$c" = "$sidecar" ]; then
                    SKIP="true"
                    break
                fi
            done

            if [ "$SKIP" = "false" ]; then
                APP_CONTAINER="$c"
                break
            fi
        done

        echo "Detected app container: $APP_CONTAINER"
        echo -n "$APP_CONTAINER" > /applogs/app-container-name.txt
      env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      volumeMounts:
        - name: log-storage
          mountPath: /applogs
          readOnly: false
    {{- end }}

  {{- if and .Values.nodeless.logs.enabled }}
  volumeMounts:
    - name: log-storage
      mountPath: /applogs
      readOnly: false
  {{- end }}
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 150m
      memory: 256Mi
{{- else }}
{{- fail "Invalid nodeless.hostingPlatform, valid values are 'fargate', provided value is %s" .Values.nodeless.hostingPlatform }}
{{- end }}
{{- end }}
