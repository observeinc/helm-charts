{{- if and .Values.application.prometheusScrape.targetAllocator.enabled (not .Values.application.prometheusScrape.independentDeployment) -}}
{{- fail "application.prometheusScrape.targetAllocator.enabled requires application.prometheusScrape.independentDeployment=true" -}}
{{- end -}}
{{- if and .Values.application.prometheusScrape.targetAllocator.enabled .Values.node.metrics.cadvisor.separate_pipeline -}}
{{- fail "application.prometheusScrape.targetAllocator.enabled requires node.metrics.cadvisor.separate_pipeline=false; the Target Allocator allocates targets per-receiver, so all scrape jobs must share one prometheus receiver for sharding to work" -}}
{{- end -}}
{{- $scraperReplicas := index .Values "prometheus-scraper" "replicaCount" | default 1 | int -}}
{{- if and .Values.application.prometheusScrape.independentDeployment (gt $scraperReplicas 1) (not .Values.application.prometheusScrape.targetAllocator.enabled) -}}
{{- fail "prometheus-scraper.replicaCount > 1 requires application.prometheusScrape.targetAllocator.enabled=true; without TA every replica scrapes the same targets and produces duplicate metrics" -}}
{{- end -}}
{{ if .Values.application.prometheusScrape.independentDeployment }}
{{- include "observe-agent.validateOtelPodUid" (dict "componentName" "prometheus-scraper" "extraEnvs" (index .Values "prometheus-scraper" "extraEnvs") "fleetEnabled" .Values.agent.config.global.fleet.enabled) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-scraper
  namespace: {{ template "observe-agent.namespace" . }}
data:
  relay: |
      {{- include "observe.deployment.applyPrometheusScraperConfig" . | nindent 4 -}}
{{ end -}}
