---
# Source: agent/charts/node-logs-metrics/templates/daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: example-node-logs-metrics-agent
  namespace: observe
  labels:
    helm.sh/chart: node-logs-metrics-0.143.0
    app.kubernetes.io/name: node-logs-metrics
    app.kubernetes.io/instance: example
    app.kubernetes.io/version: "0.143.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: opentelemetry-collector
    app.kubernetes.io/component: agent-collector
spec:
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: node-logs-metrics
      app.kubernetes.io/instance: example
      component: agent-collector
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      annotations:
        checksum/config: 01ba4719c80b6fe911b091a7c05124b64eeece964e09c058ef8f9805daca546b
        observe_monitor_path: /metrics
        observe_monitor_port: "8888"
        observe_monitor_purpose: observecollection
        observe_monitor_scrape: "true"
        observeinc_com_scrape: "false"
      labels:
        app.kubernetes.io/name: node-logs-metrics
        app.kubernetes.io/instance: example
        component: agent-collector

    spec:

      serviceAccountName: observe-agent-service-account
      automountServiceAccountToken: true
      securityContext:
        {}
      containers:
        - name: node-logs-metrics
          command:
            - /observe-agent
          args:
            - --config=/conf/relay.yaml
            - start
            - --observe-config=/observe-agent-conf/observe-agent.yaml
            - --config=/conf/relay.yaml
            - --feature-gates=+exporter.prometheusremotewritexporter.EnableMultipleWorkers
          securityContext:
            runAsGroup: 0
            runAsUser: 0
          image: "observeinc/observe-agent:2.14.0"
          imagePullPolicy: IfNotPresent
          ports:

            - name: metrics
              containerPort: 8888
              protocol: TCP
          env:
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: GOMEMLIMIT
              value: "409MiB"
            - name: OTEL_K8S_POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: OTEL_K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OBSERVE_CLUSTER_NAME
              valueFrom:
                configMapKeyRef:
                  key: name
                  name: cluster-name
            - name: OBSERVE_CLUSTER_UID
              valueFrom:
                configMapKeyRef:
                  key: id
                  name: cluster-info
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: K8S_NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  key: OBSERVE_TOKEN
                  name: agent-credentials
                  optional: true
            - name: TRACES_TOKEN
              valueFrom:
                secretKeyRef:
                  key: TRACES_TOKEN
                  name: agent-credentials
                  optional: true
          livenessProbe:
            initialDelaySeconds: 30
            periodSeconds: 5
            httpGet:
              path: /status
              port: 13133
          readinessProbe:
            initialDelaySeconds: 30
            periodSeconds: 5
            httpGet:
              path: /status
              port: 13133
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - mountPath: /conf
              name: node-logs-metrics-configmap
            - mountPath: /observe-agent-conf
              name: observe-agent-deployment-config
            - mountPath: /var/log/pods
              name: varlogpods
              readOnly: true
            - mountPath: /var/lib/docker/containers
              name: varlibdockercontainers
              readOnly: true
            - mountPath: /var/lib/otelcol
              name: varlibotelcol
            - mountPath: /hostfs
              mountPropagation: HostToContainer
              name: hostfs
              readOnly: true
      initContainers:
        - env:
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          image: observeinc/kube-cluster-info:v0.11.6
          imagePullPolicy: Always
          name: kube-cluster-info
      volumes:
        - name: node-logs-metrics-configmap
          configMap:
            name: node-logs-metrics
            items:
              - key: relay
                path: relay.yaml
        - configMap:
            defaultMode: 420
            items:
            - key: relay
              path: observe-agent.yaml
            name: observe-agent
          name: observe-agent-deployment-config
        - hostPath:
            path: /var/log/pods
          name: varlogpods
        - hostPath:
            path: /var/lib/docker/containers
          name: varlibdockercontainers
        - hostPath:
            path: /var/lib/otelcol
            type: DirectoryOrCreate
          name: varlibotelcol
        - hostPath:
            path: /
          name: hostfs
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: observeinc.com/unschedulable
                operator: DoesNotExist
              - key: kubernetes.io/os
                operator: NotIn
                values:
                - windows
      hostNetwork: false
