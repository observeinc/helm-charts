---
# Source: agent/templates/node-logs-metrics-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: node-logs-metrics
  namespace: observe
data:
  relay: |
      exporters:
        debug/override:
          sampling_initial: 2
          sampling_thereafter: 1
          verbosity: basic
        otlphttp/observe/agentheartbeat:
          compression: zstd
          headers:
            authorization: ${env:OBSERVE_AUTHORIZATION_HEADER}
            x-observe-context: '{"environment":"kubernetes","version":"${env:OBSERVE_AGENT_VERSION}"}'
            x-observe-enable-auth-error-reporting: "true"
            x-observe-target-package: Observe Agent
          logs_endpoint: ${env:OBSERVE_COLLECTOR_URL}/v1/kubernetes/v1/entity
          retry_on_failure:
            enabled: true
            initial_interval: 1s
            max_elapsed_time: 5m
            max_interval: 30s
          sending_queue:
            batch:
              flush_timeout: 5s
              max_size: 41943040
              min_size: 0
              sizer: bytes
            enabled: true
        otlphttp/observe/base:
          compression: zstd
          endpoint: ${env:OBSERVE_OTEL_ENDPOINT}
          headers:
            authorization: ${env:OBSERVE_AUTHORIZATION_HEADER}
            x-observe-target-package: Kubernetes Explorer
          retry_on_failure:
            enabled: true
            initial_interval: 1s
            max_elapsed_time: 5m
            max_interval: 30s
          sending_queue:
            batch:
              flush_timeout: 5s
              max_size: 41943040
              min_size: 0
              sizer: bytes
            enabled: true
          timeout: 10s
        prometheusremotewrite/observe:
          endpoint: ${env:OBSERVE_PROMETHEUS_ENDPOINT}
          headers:
            authorization: ${env:OBSERVE_AUTHORIZATION_HEADER}
            x-observe-target-package: Kubernetes Explorer
          max_batch_request_parallelism: 5
          remote_write_queue:
            num_consumers: 5
          resource_to_telemetry_conversion:
            enabled: true
          retry_on_failure:
            enabled: true
            initial_interval: 1s
            max_elapsed_time: 5m
            max_interval: 30s
          send_metadata: true
          timeout: 10s
      extensions:
        file_storage:
          create_directory: true
      processors:
        attributes/debug_source_hostmetrics:
          actions:
          - action: insert
            key: debug_source
            value: hostmetrics
        attributes/debug_source_kubeletstats_metrics:
          actions:
          - action: insert
            key: debug_source
            value: kubeletstats_metrics
        attributes/debug_source_pod_logs:
          actions:
          - action: insert
            key: debug_source
            value: pod_logs
        batch:
          send_batch_max_size: 4096
          send_batch_size: 4096
          timeout: 5s
        k8sattributes:
          extract:
            labels:
            - from: pod
              key_regex: (app\.kubernetes\.io/.+)
              tag_name: $1
            metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.replicaset.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.node.name
            - k8s.node.uid
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.cluster.uid
            - k8s.container.name
            - container.id
            - service.namespace
            - service.name
            - service.version
            - service.instance.id
            otel_annotations: true
          filter:
            node_from_env_var: K8S_NODE_NAME
          passthrough: false
          pod_association:
          - sources:
            - from: resource_attribute
              name: k8s.pod.ip
          - sources:
            - from: resource_attribute
              name: k8s.pod.uid
          - sources:
            - from: connection
          wait_for_metadata: false
          wait_for_metadata_timeout: 10s
        memory_limiter:
          check_interval: 5s
          limit_percentage: 80
          spike_limit_percentage: 15
        metricstransform/duplicate_k8s_cpu_metrics:
          transforms:
          - action: insert
            include: container.cpu.usage
            new_name: container.cpu.utilization
          - action: insert
            include: k8s.pod.cpu.usage
            new_name: k8s.pod.cpu.utilization
          - action: insert
            include: k8s.node.cpu.usage
            new_name: k8s.node.cpu.utilization
        resource/agent_instance:
          attributes:
          - action: upsert
            key: k8s.pod.uid
            value: ${env:OTEL_K8S_POD_UID}
          - action: upsert
            key: k8s.pod.name
            value: ${env:OTEL_K8S_POD_NAME}
        resource/observe_common:
          attributes:
          - action: upsert
            key: k8s.cluster.name
            value: ${env:OBSERVE_CLUSTER_NAME}
          - action: upsert
            key: k8s.cluster.uid
            value: ${env:OBSERVE_CLUSTER_UID}
        resourcedetection:
          detectors:
          - env
          - system
          override: false
          timeout: 2s
        resourcedetection/cloud:
          detectors:
          - eks
          - gcp
          - ecs
          - ec2
          - azure
          override: false
          timeout: 2s
        transform/k8sheartbeat:
          error_mode: ignore
          log_statements:
          - context: log
            statements:
            - set(attributes["observe_transform"]["identifiers"]["host.name"], resource.attributes["k8s.node.name"])
            - set(attributes["observe_transform"]["identifiers"]["k8s.pod.uid"], resource.attributes["k8s.pod.uid"])
            - set(attributes["observe_transform"]["identifiers"]["k8s.pod.name"], resource.attributes["k8s.pod.name"])
            - set(attributes["observe_transform"]["identifiers"]["k8s.deployment.name"],
              resource.attributes["k8s.deployment.name"])
            - set(attributes["observe_transform"]["identifiers"]["k8s.daemonset.name"],
              resource.attributes["k8s.daemonset.name"])
            - set(attributes["observe_transform"]["identifiers"]["deployment.environment.name"],
              resource.attributes["deployment.environment.name"])
            - set(attributes["observe_transform"]["identifiers"]["k8s.cluster.uid"], resource.attributes["k8s.cluster.uid"])
            - set(attributes["observe_transform"]["identifiers"]["k8s.cluster.name"], resource.attributes["k8s.cluster.name"])
            - set(attributes["observe_transform"]["identifiers"]["k8s.namespace.name"],
              resource.attributes["k8s.namespace.name"])
      receivers:
        filelog:
          exclude:
          - '**/*.gz'
          - '**/*.tmp'
          exclude_older_than: 24h
          include:
          - /var/log/pods/*/*/*.log
          - /var/log/pods/*/*/*.log.*
          include_file_name: false
          include_file_path: true
          max_log_size: 1024kb
          operators:
          - id: container-parser
            max_log_size: 102400
            type: container
          poll_interval: 20ms
          retry_on_failure:
            enabled: true
            initial_interval: 1s
            max_elapsed_time: 5m
            max_interval: 30s
          start_at: end
          storage: file_storage
        heartbeat:
          auth_check:
            headers:
              authorization: ${env:OBSERVE_AUTHORIZATION_HEADER}
            url: ${env:OBSERVE_COLLECTOR_URL}
          config_interval: 24h
          environment: kubernetes
          interval: 10m
        hostmetrics:
          collection_interval: 60s
          root_path: /hostfs
          scrapers:
            cpu: null
            disk: null
            filesystem:
              exclude_fs_types:
                fs_types:
                - autofs
                - binfmt_misc
                - bpf
                - cgroup2
                - configfs
                - debugfs
                - devpts
                - devtmpfs
                - fusectl
                - hugetlbfs
                - iso9660
                - mqueue
                - nsfs
                - overlay
                - proc
                - procfs
                - pstore
                - rpc_pipefs
                - securityfs
                - selinuxfs
                - squashfs
                - sysfs
                - tracefs
                match_type: strict
              exclude_mount_points:
                match_type: regexp
                mount_points:
                - /dev/*
                - /proc/*
                - /sys/*
                - /run/k3s/containerd/*
                - /var/lib/docker/*
                - /var/lib/kubelet/*
                - /snap/*
            load: null
            memory: null
            network: null
        kubeletstats:
          auth_type: serviceAccount
          collection_interval: 60s
          endpoint: ${env:K8S_NODE_NAME}:10250
          extra_metadata_labels:
          - container.id
          insecure_skip_verify: true
          k8s_api_config:
            auth_type: serviceAccount
          metric_groups:
          - node
          - pod
          - container
          metrics:
            container.cpu.usage:
              enabled: true
            container.uptime:
              enabled: true
            k8s.container.cpu.node.utilization:
              enabled: true
            k8s.container.cpu_limit_utilization:
              enabled: true
            k8s.container.cpu_request_utilization:
              enabled: true
            k8s.container.memory.node.utilization:
              enabled: true
            k8s.container.memory_limit_utilization:
              enabled: true
            k8s.container.memory_request_utilization:
              enabled: true
            k8s.node.cpu.usage:
              enabled: true
            k8s.node.uptime:
              enabled: true
            k8s.pod.cpu.node.utilization:
              enabled: true
            k8s.pod.cpu.usage:
              enabled: true
            k8s.pod.cpu_limit_utilization:
              enabled: true
            k8s.pod.cpu_request_utilization:
              enabled: true
            k8s.pod.memory.node.utilization:
              enabled: true
            k8s.pod.memory_limit_utilization:
              enabled: true
            k8s.pod.memory_request_utilization:
              enabled: true
            k8s.pod.uptime:
              enabled: true
          node: ${env:K8S_NODE_NAME}
      service:
        pipelines:
          logs:
            exporters:
            - otlphttp/observe/base
            processors:
            - memory_limiter
            - k8sattributes
            - resourcedetection/cloud
            - resource/observe_common
            - attributes/debug_source_pod_logs
            receivers:
            - filelog
          logs/heartbeat:
            exporters:
            - otlphttp/observe/agentheartbeat
            processors:
            - resourcedetection
            - resource/agent_instance
            - k8sattributes
            - resource/observe_common
            - transform/k8sheartbeat
            receivers:
            - heartbeat
          metrics/hostmetrics:
            exporters:
            - prometheusremotewrite/observe
            processors:
            - memory_limiter
            - k8sattributes
            - resourcedetection/cloud
            - resource/observe_common
            - attributes/debug_source_hostmetrics
            receivers:
            - hostmetrics
          metrics/kubeletstats:
            exporters:
            - prometheusremotewrite/observe
            processors:
            - memory_limiter
            - metricstransform/duplicate_k8s_cpu_metrics
            - k8sattributes
            - resourcedetection/cloud
            - resource/observe_common
            - attributes/debug_source_kubeletstats_metrics
            receivers:
            - kubeletstats
