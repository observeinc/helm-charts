---
# Source: agent/templates/gateway-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway
  namespace: observe
data:
  relay: |
      connectors:
        spanmetrics:
          aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
          dimensions:
          - name: service.namespace
          - name: service.version
          - name: deployment.environment.name
          - name: k8s.pod.name
          - name: k8s.namespace.name
          - name: peer.db.name
          - name: peer.messaging.system
          - name: otel.status_description
          - name: observe.status_code
          histogram:
            exponential:
              max_size: 100
        spanmetrics/summary:
          aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
          dimensions:
          - name: service.namespace
          - name: deployment.environment.name
          - name: peer.db.name
          - name: peer.messaging.system
          histogram:
            exponential:
              max_size: 100
      exporters:
        debug/override:
          sampling_initial: 2
          sampling_thereafter: 1
          verbosity: basic
        otlphttp/observe/agentheartbeat:
          compression: zstd
          headers:
            authorization: ${env:OBSERVE_AUTHORIZATION_HEADER}
            x-observe-context: '{"environment":"kubernetes","version":"${env:OBSERVE_AGENT_VERSION}"}'
            x-observe-enable-auth-error-reporting: "true"
            x-observe-target-package: Observe Agent
          logs_endpoint: ${env:OBSERVE_COLLECTOR_URL}/v1/kubernetes/v1/entity
          retry_on_failure:
            enabled: true
            initial_interval: 1s
            max_elapsed_time: 5m
            max_interval: 30s
          sending_queue:
            batch:
              flush_timeout: 5s
              max_size: 41943040
              min_size: 0
              sizer: bytes
            enabled: true
        otlphttp/observe/base:
          compression: zstd
          endpoint: ${env:OBSERVE_OTEL_ENDPOINT}
          headers:
            authorization: ${env:OBSERVE_AUTHORIZATION_HEADER}
            x-observe-target-package: Kubernetes Explorer
          retry_on_failure:
            enabled: true
            initial_interval: 1s
            max_elapsed_time: 5m
            max_interval: 30s
          sending_queue:
            batch:
              flush_timeout: 5s
              max_size: 41943040
              min_size: 0
              sizer: bytes
            enabled: true
          timeout: 10s
        otlphttp/observe/forward/trace:
          compression: zstd
          endpoint: ${env:OBSERVE_OTEL_ENDPOINT}
          headers:
            authorization: Bearer ${env:TRACE_TOKEN}
            x-observe-target-package: Tracing
          retry_on_failure:
            enabled: true
            initial_interval: 1s
            max_elapsed_time: 5m
            max_interval: 30s
          sending_queue:
            batch:
              flush_timeout: 5s
              max_size: 41943040
              min_size: 0
              sizer: bytes
            enabled: true
          timeout: 10s
        otlphttp/observe/otel_metrics:
          compression: zstd
          endpoint: ${env:OBSERVE_OTEL_ENDPOINT}
          headers:
            authorization: ${env:OBSERVE_AUTHORIZATION_HEADER}
            x-observe-target-package: Metrics
          retry_on_failure:
            enabled: true
            initial_interval: 1s
            max_elapsed_time: 5m
            max_interval: 30s
          sending_queue:
            batch:
              flush_timeout: 5s
              max_size: 41943040
              min_size: 0
              sizer: bytes
            enabled: true
          timeout: 10s
      processors:
        attributes/debug_source_gateway:
          actions:
          - action: upsert
            key: debug_source
            value: gateway
        attributes/debug_source_span_metrics:
          actions:
          - action: insert
            key: debug_source
            value: span_metrics
        batch:
          send_batch_max_size: 4096
          send_batch_size: 4096
          timeout: 5s
        cumulativetodelta/observe:
          max_staleness: 5m
        deltatocumulative/observe:
          max_stale: 5m
        filter/drop_long_spans:
          error_mode: ignore
          traces:
            span:
            - (span.end_time - span.start_time) > Duration("1h")
        filter/drop_span_kinds_other_than_server_and_consumer_and_peer_client:
          error_mode: ignore
          traces:
            span:
            - span.kind == SPAN_KIND_CLIENT and span.attributes["peer.db.name"] == nil and
              span.attributes["db.system.name"] == nil and span.attributes["db.system"]
              == nil
            - span.kind == SPAN_KIND_PRODUCER and span.attributes["peer.messaging.system"]
              == nil and span.attributes["messaging.system"] == nil
            - span.kind == SPAN_KIND_UNSPECIFIED
            - span.kind == SPAN_KIND_INTERNAL
        groupbyattrs/peers:
          keys:
          - peer.db.name
          - peer.messaging.system
        k8sattributes:
          extract:
            labels:
            - from: pod
              key_regex: (app\.kubernetes\.io/.+)
              tag_name: $1
            metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.replicaset.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.node.name
            - k8s.node.uid
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.cluster.uid
            - k8s.container.name
            - container.id
            - service.namespace
            - service.name
            - service.version
            - service.instance.id
            otel_annotations: true
          passthrough: false
          pod_association:
          - sources:
            - from: resource_attribute
              name: k8s.pod.ip
          - sources:
            - from: resource_attribute
              name: k8s.pod.uid
          - sources:
            - from: connection
          wait_for_metadata: false
          wait_for_metadata_timeout: 10s
        memory_limiter:
          check_interval: 5s
          limit_percentage: 80
          spike_limit_percentage: 15
        metricstransform/rename_summary_metrics:
          transforms:
          - action: update
            include: traces.span.metrics.calls
            new_name: traces.span.metrics.calls.summary
          - action: update
            include: traces.span.metrics.duration
            new_name: traces.span.metrics.duration.summary
        resource/agent_instance:
          attributes:
          - action: upsert
            key: k8s.pod.uid
            value: ${env:OTEL_K8S_POD_UID}
          - action: upsert
            key: k8s.pod.name
            value: ${env:OTEL_K8S_POD_NAME}
        resource/observe_common:
          attributes:
          - action: upsert
            key: k8s.cluster.name
            value: ${env:OBSERVE_CLUSTER_NAME}
          - action: upsert
            key: k8s.cluster.uid
            value: ${env:OBSERVE_CLUSTER_UID}
        resourcedetection:
          detectors:
          - env
          - system
          override: false
          timeout: 2s
        resourcedetection/cloud:
          detectors:
          - gcp
          - ecs
          - ec2
          - azure
          override: false
          timeout: 2s
        tail_sampling/observe:
          policies:
          - name: retain-all-errors
            status_code:
              status_codes:
              - ERROR
            type: status_code
          - name: sample-probabilistically-10-percent
            probabilistic:
              sampling_percentage: 10
            type: probabilistic
        transform/add_empty_service_attributes:
          error_mode: ignore
          trace_statements:
          - set(resource.attributes["deployment.environment.name"], resource.attributes["deployment.environment"])
            where resource.attributes["deployment.environment.name"] == nil and resource.attributes["deployment.environment"]
            != nil
          - set(resource.attributes["deployment.environment"], resource.attributes["deployment.environment.name"])
            where resource.attributes["deployment.environment"] == nil and resource.attributes["deployment.environment.name"]
            != nil
          - set(resource.attributes["service.name"], "") where resource.attributes["service.name"]
            == nil
          - set(resource.attributes["service.namespace"], "") where resource.attributes["service.namespace"]
            == nil
          - set(resource.attributes["deployment.environment.name"], "") where resource.attributes["deployment.environment.name"]
            == nil
          - set(resource.attributes["deployment.environment"], "") where resource.attributes["deployment.environment"]
            == nil
        transform/add_span_status_code:
          error_mode: ignore
          trace_statements:
          - set(span.attributes["observe.status_code"], Int(span.attributes["rpc.grpc.status_code"]))
            where span.attributes["observe.status_code"] == nil and span.attributes["rpc.grpc.status_code"]
            != nil
          - set(span.attributes["observe.status_code"], Int(span.attributes["grpc.status_code"]))
            where span.attributes["observe.status_code"] == nil and span.attributes["grpc.status_code"]
            != nil
          - set(span.attributes["observe.status_code"], Int(span.attributes["rpc.status_code"]))
            where span.attributes["observe.status_code"] == nil and span.attributes["rpc.status_code"]
            != nil
          - set(span.attributes["observe.status_code"], Int(span.attributes["http.status_code"]))
            where span.attributes["observe.status_code"] == nil and span.attributes["http.status_code"]
            != nil
          - set(span.attributes["observe.status_code"], Int(span.attributes["http.response.status_code"]))
            where span.attributes["observe.status_code"] == nil and span.attributes["http.response.status_code"]
            != nil
        transform/fix_peer_attributes:
          error_mode: ignore
          metric_statements:
          - set(datapoint.attributes["peer.db.name"], resource.attributes["peer.db.name"])
            where resource.attributes["peer.db.name"] != nil
          - set(datapoint.attributes["peer.messaging.system"], resource.attributes["peer.messaging.system"])
            where resource.attributes["peer.messaging.system"] != nil
        transform/fix_red_metrics_resource_attributes:
          error_mode: ignore
          metric_statements:
          - keep_matching_keys(resource.attributes, "^(service.name|service.namespace|service.version|deployment.environment.name|k8s.pod.name|k8s.namespace.name)")
          - delete_matching_keys(datapoint.attributes, "^(service.name|service.namespace|service.version|deployment.environment.name|k8s.pod.name|k8s.namespace.name)")
          - set(datapoint.attributes["otel.status_code"], "OK") where datapoint.attributes["status.code"]
            == "STATUS_CODE_OK"
          - set(datapoint.attributes["otel.status_code"], "ERROR") where datapoint.attributes["status.code"]
            == "STATUS_CODE_ERROR"
          - delete_key(datapoint.attributes, "status.code")
        transform/fix_red_metrics_resource_attributes/summary:
          error_mode: ignore
          metric_statements:
          - keep_matching_keys(resource.attributes, "^(service.name|service.namespace|deployment.environment.name)")
          - delete_matching_keys(datapoint.attributes, "^(service.name|service.namespace|deployment.environment.name)")
          - set(datapoint.attributes["otel.status_code"], "OK") where datapoint.attributes["status.code"]
            == "STATUS_CODE_OK"
          - set(datapoint.attributes["otel.status_code"], "ERROR") where datapoint.attributes["status.code"]
            == "STATUS_CODE_ERROR"
          - delete_key(datapoint.attributes, "status.code")
        transform/k8sheartbeat:
          error_mode: ignore
          log_statements:
          - context: log
            statements:
            - set(attributes["observe_transform"]["identifiers"]["host.name"], resource.attributes["k8s.node.name"])
            - set(attributes["observe_transform"]["identifiers"]["k8s.pod.uid"], resource.attributes["k8s.pod.uid"])
            - set(attributes["observe_transform"]["identifiers"]["k8s.pod.name"], resource.attributes["k8s.pod.name"])
            - set(attributes["observe_transform"]["identifiers"]["k8s.deployment.name"],
              resource.attributes["k8s.deployment.name"])
            - set(attributes["observe_transform"]["identifiers"]["k8s.daemonset.name"],
              resource.attributes["k8s.daemonset.name"])
            - set(attributes["observe_transform"]["identifiers"]["deployment.environment.name"],
              resource.attributes["deployment.environment.name"])
            - set(attributes["observe_transform"]["identifiers"]["k8s.cluster.uid"], resource.attributes["k8s.cluster.uid"])
            - set(attributes["observe_transform"]["identifiers"]["k8s.cluster.name"], resource.attributes["k8s.cluster.name"])
            - set(attributes["observe_transform"]["identifiers"]["k8s.namespace.name"],
              resource.attributes["k8s.namespace.name"])
        transform/remove_service_name_for_peer_metrics:
          error_mode: ignore
          metric_statements:
          - delete_key(resource.attributes, "service.name") where datapoint.attributes["peer.db.name"]
            != nil or datapoint.attributes["peer.messaging.system"] != nil
        transform/shape_spans_for_red_metrics:
          error_mode: ignore
          trace_statements:
          - set(span.attributes["peer.db.name"], span.attributes["db.system.name"]) where
            span.attributes["peer.db.name"] == nil and span.attributes["db.system.name"]
            != nil
          - set(span.attributes["peer.db.name"], span.attributes["db.system"]) where span.attributes["peer.db.name"]
            == nil and span.attributes["db.system"] != nil
          - set(span.attributes["peer.messaging.system"], span.attributes["messaging.system"])
            where span.attributes["peer.messaging.system"] == nil and span.attributes["messaging.system"]
            != nil
          - set(span.attributes["otel.status_description"], span.status.message) where span.status.message
            != ""
      receivers:
        heartbeat:
          auth_check:
            headers:
              authorization: ${env:OBSERVE_AUTHORIZATION_HEADER}
            url: ${env:OBSERVE_COLLECTOR_URL}
          config_interval: 24h
          environment: kubernetes
          interval: 10m
        otlp/app-telemetry:
          protocols:
            grpc:
              endpoint: ${env:MY_POD_IP}:4317
              max_recv_msg_size_mib: 50
            http:
              endpoint: ${env:MY_POD_IP}:4318
      service:
        pipelines:
          logs/heartbeat:
            exporters:
            - otlphttp/observe/agentheartbeat
            processors:
            - resourcedetection
            - resource/agent_instance
            - k8sattributes
            - resource/observe_common
            - transform/k8sheartbeat
            receivers:
            - heartbeat
          logs/observe-forward:
            exporters:
            - otlphttp/observe/base
            processors:
            - memory_limiter
            - k8sattributes
            - resource/observe_common
            - attributes/debug_source_gateway
            receivers:
            - otlp/app-telemetry
          metrics/observe-forward:
            exporters:
            - otlphttp/observe/otel_metrics
            processors:
            - memory_limiter
            - k8sattributes
            - cumulativetodelta/observe
            - resource/observe_common
            - attributes/debug_source_gateway
            receivers:
            - otlp/app-telemetry
          metrics/spanmetrics:
            exporters:
            - otlphttp/observe/otel_metrics
            processors:
            - memory_limiter
            - groupbyattrs/peers
            - transform/fix_peer_attributes
            - transform/remove_service_name_for_peer_metrics
            - transform/fix_red_metrics_resource_attributes
            - resource/observe_common
            - attributes/debug_source_span_metrics
            receivers:
            - spanmetrics
          metrics/spanmetrics/summary:
            exporters:
            - otlphttp/observe/otel_metrics
            processors:
            - memory_limiter
            - groupbyattrs/peers
            - transform/fix_peer_attributes
            - transform/remove_service_name_for_peer_metrics
            - transform/fix_red_metrics_resource_attributes/summary
            - metricstransform/rename_summary_metrics
            - resource/observe_common
            receivers:
            - spanmetrics/summary
          traces/observe-forward:
            exporters:
            - otlphttp/observe/forward/trace
            processors:
            - memory_limiter
            - k8sattributes
            - transform/add_span_status_code
            - transform/add_empty_service_attributes
            - attributes/debug_source_gateway
            - tail_sampling/observe
            - resource/observe_common
            receivers:
            - otlp/app-telemetry
          traces/spanmetrics:
            exporters:
            - spanmetrics
            processors:
            - memory_limiter
            - filter/drop_long_spans
            - filter/drop_span_kinds_other_than_server_and_consumer_and_peer_client
            - k8sattributes
            - transform/shape_spans_for_red_metrics
            - transform/add_span_status_code
            - transform/add_empty_service_attributes
            receivers:
            - otlp/app-telemetry
          traces/spanmetrics/summary:
            exporters:
            - spanmetrics/summary
            processors:
            - memory_limiter
            - filter/drop_long_spans
            - filter/drop_span_kinds_other_than_server_and_consumer_and_peer_client
            - k8sattributes
            - transform/shape_spans_for_red_metrics
            - transform/add_empty_service_attributes
            receivers:
            - otlp/app-telemetry
