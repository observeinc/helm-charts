---
# Source: agent/templates/nodeless-otelcollector.yaml
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: fargate-collector
spec:
  mode: sidecar
  image: "ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.141.0"
  env:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: OTEL_K8S_POD_UID
      valueFrom:
        fieldRef:
          fieldPath: metadata.uid
    - name: OTEL_K8S_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    - name: OBSERVE_CLUSTER_NAME
      value: "observe-agent-monitored-cluster"
    - name: OBSERVE_CLUSTER_UID
      valueFrom:
        configMapKeyRef:
          name: cluster-info
          key: id
    - name: OBSERVE_OTEL_ENDPOINT
      value: "v2/otel"
    - name: OBSERVE_PROMETHEUS_ENDPOINT
      value: "v1/prometheus"
    - name: OBSERVE_AUTHORIZATION_HEADER
      value: "Bearer "
  config:
      exporters:
        debug/override:
          sampling_initial: 2
          sampling_thereafter: 1
          verbosity: basic
        otlphttp/observe/base:
          compression: zstd
          endpoint: ${env:OBSERVE_OTEL_ENDPOINT}
          headers:
            authorization: ${env:OBSERVE_AUTHORIZATION_HEADER}
            x-observe-target-package: Kubernetes Explorer
          retry_on_failure:
            enabled: true
            initial_interval: 1s
            max_elapsed_time: 5m
            max_interval: 30s
          sending_queue:
            batch:
              flush_timeout: 5s
              max_size: 41943040
              min_size: 0
              sizer: bytes
            enabled: true
          timeout: 10s
        prometheusremotewrite/observe:
          endpoint: ${env:OBSERVE_PROMETHEUS_ENDPOINT}
          headers:
            authorization: ${env:OBSERVE_AUTHORIZATION_HEADER}
            x-observe-target-package: Kubernetes Explorer
          max_batch_request_parallelism: 5
          remote_write_queue:
            num_consumers: 5
          resource_to_telemetry_conversion:
            enabled: true
          retry_on_failure:
            enabled: true
            initial_interval: 1s
            max_elapsed_time: 5m
            max_interval: 30s
          send_metadata: true
          timeout: 10s
      extensions:
        file_storage/fargate:
          create_directory: true
          directory: /applogs/.file_storage
      processors:
        attributes/debug_source_fargate_pod_logs:
          actions:
          - action: insert
            key: debug_source
            value: fargate_pod_logs
        attributes/debug_source_sidecar_kubeletstats_metrics:
          actions:
          - action: insert
            key: debug_source
            value: sidecar_kubeletstats_metrics
        batch:
          send_batch_max_size: 4096
          send_batch_size: 4096
          timeout: 5s
        deltatocumulative/observe:
          max_stale: 5m
        k8sattributes:
          extract:
            labels:
            - from: pod
              key_regex: (app\.kubernetes\.io/.+)
              tag_name: $1
            metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.replicaset.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.node.name
            - k8s.node.uid
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.cluster.uid
            - k8s.container.name
            - container.id
            - service.namespace
            - service.name
            - service.version
            - service.instance.id
            otel_annotations: true
          passthrough: false
          pod_association:
          - sources:
            - from: resource_attribute
              name: k8s.pod.ip
          - sources:
            - from: resource_attribute
              name: k8s.pod.uid
          - sources:
            - from: connection
          wait_for_metadata: false
          wait_for_metadata_timeout: 10s
        memory_limiter:
          check_interval: 5s
          limit_percentage: 80
          spike_limit_percentage: 15
        metricstransform/duplicate_k8s_cpu_metrics:
          transforms:
          - action: insert
            include: container.cpu.usage
            new_name: container.cpu.utilization
          - action: insert
            include: k8s.pod.cpu.usage
            new_name: k8s.pod.cpu.utilization
          - action: insert
            include: k8s.node.cpu.usage
            new_name: k8s.node.cpu.utilization
        resource/fargate_resource_attributes:
          attributes:
          - action: upsert
            key: k8s.pod.uid
            value: ${env:OTEL_K8S_POD_UID}
          - action: upsert
            key: k8s.pod.ip
            value: ${env:OTEL_K8S_POD_IP}
          - action: upsert
            key: k8s.container.name
            value: ${file:/applogs/app-container-name.txt}
        resource/observe_common:
          attributes:
          - action: upsert
            key: k8s.cluster.name
            value: ${env:OBSERVE_CLUSTER_NAME}
          - action: upsert
            key: k8s.cluster.uid
            value: ${env:OBSERVE_CLUSTER_UID}
        resourcedetection/cloud:
          detectors:
          - eks
          - gcp
          - ecs
          - ec2
          - azure
          override: false
          timeout: 2s
      receivers:
        filelog/fargate-container-logs:
          exclude:
          - '**/*.gz'
          - '**/*.tmp'
          exclude_older_than: 24h
          include:
          - /applogs/**/*.log
          - /applogs/**/*.log.*
          include_file_name: false
          include_file_path: true
          poll_interval: 20ms
          retry_on_failure:
            enabled: true
            initial_interval: 1s
            max_elapsed_time: 5m
            max_interval: 30s
          start_at: end
      service:
        extensions:
        - file_storage/fargate
        pipelines:
          logs/filelog:
            exporters:
            - otlphttp/observe/base
            processors:
            - memory_limiter
            - resource/fargate_resource_attributes
            - k8sattributes
            - batch
            - resource/observe_common
            - attributes/debug_source_fargate_pod_logs
            receivers:
            - filelog/fargate-container-logs
  initContainers:
    - name: kube-cluster-info
      image: observeinc/kube-cluster-info:v0.11.5
      imagePullPolicy: Always
      env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
    - name: logging-sidecar
      restartPolicy: Always
      image: alpine/k8s:1.28.3
      resources:
        requests:
          memory: 100Mi
          cpu: 100m
        limits:
          memory: 100Mi
      command: ["/bin/sh", "-c"]
      args:
        - |
          apk add --no-cache logrotate curl
          # Get the first container name
          APP_CONTAINER=$(kubectl get pod "$POD_NAME" -n "$POD_NAMESPACE" \
            -o jsonpath='{.spec.containers[0].name}')

          echo "Detected app container: $APP_CONTAINER"
          echo -n "$APP_CONTAINER" > /applogs/app-container-name.txt

          # Create logrotate config inline
          # size and rotation should keep total memory usage < 5Mi per container
          # compression helps keep the size down
          # delaycompress, copytruncate to prevent concurrency issues with applications writing to the log file
          # missingok to suppress errors in case application has not written to the log file yet
          # notifempty to prevent logrotate from creating a new file if the log file is empty
          # su root root to grant logrotate permission to rotate the log file
          cat > /etc/logrotate.conf << 'EOF'
          /applogs/*.log {
              size 1M
              rotate 5
              compress
              delaycompress
              missingok
              notifempty
              copytruncate
              dateext
              su root root
              dateformat -%Y%m%d-%H%M%S
          }
          EOF

          # Run logrotate
          while true; do
            logrotate -v /etc/logrotate.conf
            sleep 60
          done
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: K8S_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
      volumeMounts:
        - name: log-storage
          mountPath: /applogs
          readOnly: false
  volumeMounts:
    - name: log-storage
      mountPath: /applogs
      readOnly: false
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 150m
      memory: 256Mi
