---
# Source: agent/charts/forwarder/templates/daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: example-forwarder-agent
  namespace: observe
  labels:
    helm.sh/chart: forwarder-0.143.0
    app.kubernetes.io/name: forwarder
    app.kubernetes.io/instance: example
    app.kubernetes.io/version: "0.143.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: opentelemetry-collector
    app.kubernetes.io/component: agent-collector
spec:
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: forwarder
      app.kubernetes.io/instance: example
      component: agent-collector
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      annotations:
        checksum/config: 01ba4719c80b6fe911b091a7c05124b64eeece964e09c058ef8f9805daca546b
        observe_monitor_path: /metrics
        observe_monitor_port: "8888"
        observe_monitor_purpose: observecollection
        observe_monitor_scrape: "true"
        observeinc_com_scrape: "false"
      labels:
        app.kubernetes.io/name: forwarder
        app.kubernetes.io/instance: example
        component: agent-collector

    spec:

      serviceAccountName: observe-agent-service-account
      automountServiceAccountToken: true
      securityContext:
        {}
      containers:
        - name: forwarder
          command:
            - /observe-agent
          args:
            - --config=/conf/relay.yaml
            - start
            - --observe-config=/observe-agent-conf/observe-agent.yaml
            - --config=/conf/relay.yaml
          securityContext:
            {}
          image: "observeinc/observe-agent:2.15.0"
          imagePullPolicy: IfNotPresent
          ports:

            - name: jaeger-compact
              containerPort: 6831
              protocol: UDP
              hostPort: 6831
            - name: jaeger-grpc
              containerPort: 14250
              protocol: TCP
              hostPort: 14250
            - name: jaeger-thrift
              containerPort: 14268
              protocol: TCP
              hostPort: 14268
            - name: metrics
              containerPort: 8888
              protocol: TCP
            - name: otlp
              containerPort: 4317
              protocol: TCP
              hostPort: 4317
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
              hostPort: 4318
            - name: zipkin
              containerPort: 9411
              protocol: TCP
              hostPort: 9411
          env:
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: GOMEMLIMIT
              value: "409MiB"
            - name: OTEL_K8S_POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: OTEL_K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OBSERVE_CLUSTER_NAME
              valueFrom:
                configMapKeyRef:
                  key: name
                  name: cluster-name
            - name: OBSERVE_CLUSTER_UID
              valueFrom:
                configMapKeyRef:
                  key: id
                  name: cluster-info
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  key: OBSERVE_TOKEN
                  name: agent-credentials
                  optional: true
            - name: TRACE_TOKEN
              valueFrom:
                secretKeyRef:
                  key: TRACE_TOKEN
                  name: agent-credentials
                  optional: true
          livenessProbe:
            initialDelaySeconds: 30
            periodSeconds: 5
            httpGet:
              path: /status
              port: 13133
          readinessProbe:
            initialDelaySeconds: 30
            periodSeconds: 5
            httpGet:
              path: /status
              port: 13133
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 300m
              memory: 512Mi
          volumeMounts:
            - mountPath: /conf
              name: forwarder-configmap
            - mountPath: /observe-agent-conf
              name: observe-agent-deployment-config
      initContainers:
        - env:
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          image: observeinc/kube-cluster-info:v0.11.6
          imagePullPolicy: Always
          name: kube-cluster-info
      volumes:
        - name: forwarder-configmap
          configMap:
            name: forwarder
            items:
              - key: relay
                path: relay.yaml
        - configMap:
            defaultMode: 420
            items:
            - key: relay
              path: observe-agent.yaml
            name: observe-agent
          name: observe-agent-deployment-config
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: observeinc.com/unschedulable
                operator: DoesNotExist
              - key: kubernetes.io/os
                operator: NotIn
                values:
                - windows
      hostNetwork: false
