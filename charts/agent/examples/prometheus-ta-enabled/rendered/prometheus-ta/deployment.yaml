---
# Source: agent/charts/prometheus-ta/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: observe
  name: example-prometheus-ta-ta
  labels:
    helm.sh/chart: prometheus-ta-0.128.1
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: opentelemetry-target-allocator
    app.kubernetes.io/version: "0.151.0"
    app.kubernetes.io/name: prometheus-ta
    app.kubernetes.io/instance: example
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus-ta
      app.kubernetes.io/instance: example
  template:
    metadata:
      annotations:
        checksum/config: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
        observe_monitor_path: /metrics
        observe_monitor_port: "8080"
        observe_monitor_purpose: observecollection
        observe_monitor_scrape: "true"
      labels:
        helm.sh/chart: prometheus-ta-0.128.1
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: opentelemetry-target-allocator
        app.kubernetes.io/version: "0.151.0"
        app.kubernetes.io/name: prometheus-ta
        app.kubernetes.io/instance: example
    spec:
      serviceAccountName: example-prometheus-ta-ta
      automountServiceAccountToken: false
      containers:
        - name: targetallocator
          image: ghcr.io/open-telemetry/opentelemetry-operator/target-allocator:0.151.0
          ports:
            - containerPort: 8080
              name: http-port
          volumeMounts:
            - name: config-volume
              mountPath: /conf/
            - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              name: serviceaccount-token
              readOnly: true
          env: # Workaround for https://github.com/open-telemetry/opentelemetry-operator/pull/3976
            - name: OTELCOL_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 256Mi
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-ta
            items:
              - key: targetallocator.yaml
                path: targetallocator.yaml
        - name: serviceaccount-token
          projected:
            defaultMode: 0444
            sources:
              - serviceAccountToken:
                  path: token
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        apiVersion: v1
                        fieldPath: metadata.namespace
