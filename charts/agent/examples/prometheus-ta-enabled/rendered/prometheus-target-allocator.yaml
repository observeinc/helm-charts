# Source: agent/templates/prometheus-target-allocator.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-prometheus-ta-pod-metrics
  namespace: observe
  labels:
    app.kubernetes.io/name: prometheus-target-allocator
    app.kubernetes.io/instance: example
    app.kubernetes.io/component: pod-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus-target-allocator
      app.kubernetes.io/instance: example
      app.kubernetes.io/component: pod-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus-target-allocator
        app.kubernetes.io/instance: example
        app.kubernetes.io/component: pod-metrics
    spec:
      serviceAccountName: example-prometheus-ta-pod-metrics
      containers:
        - name: target-allocator
          image: "ghcr.io/open-telemetry/opentelemetry-operator/target-allocator:0.150.0"
          imagePullPolicy: IfNotPresent
          args:
            - --config-file=/conf/targetallocator.yaml
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: OTELCOL_NAMESPACE
              value: "observe"
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: example-prometheus-ta-pod-metrics
            items:
              - key: targetallocator.yaml
                path: targetallocator.yaml
---
