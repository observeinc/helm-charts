---
# Source: agent/templates/observe-agent-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: observe-agent
  namespace: observe
data:
  relay: |
    observe_url:
    token:

    debug: false

    health_check:
      enabled: true
      endpoint: "${env:MY_POD_IP}:13133"
      path: "/status"

    internal_telemetry:
      enabled: true
      metrics:
        enabled: true
        host: "${env:MY_POD_IP}"
        port: 8888
        level: normal
      logs:
        enabled: true
        level: WARN
        encoding: console


    forwarding:
      enabled: false

    self_monitoring:
      enabled: false
      fleet:
        enabled: false

    host_monitoring:
      enabled: false
