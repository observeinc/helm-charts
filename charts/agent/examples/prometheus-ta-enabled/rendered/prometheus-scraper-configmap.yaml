---
# Source: agent/templates/prometheus-scraper-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-scraper
  namespace: observe
data:
  relay: |
      exporters:
        debug/override:
          sampling_initial: 2
          sampling_thereafter: 1
          verbosity: basic
        prometheusremotewrite/observe:
          endpoint: ${env:OBSERVE_PROMETHEUS_ENDPOINT}
          headers:
            authorization: ${env:OBSERVE_AUTHORIZATION_HEADER}
            x-observe-target-package: Kubernetes Explorer
          max_batch_request_parallelism: 5
          remote_write_queue:
            num_consumers: 5
          resource_to_telemetry_conversion:
            enabled: true
          retry_on_failure:
            enabled: true
            initial_interval: 1s
            max_elapsed_time: 5m
            max_interval: 30s
          send_metadata: true
          target_info:
            enabled: false
          timeout: 10s
      processors:
        batch:
          send_batch_max_size: 4096
          send_batch_size: 4096
          timeout: 5s
        k8sattributes:
          extract:
            labels:
            - from: pod
              key_regex: (app\.kubernetes\.io/.+)
              tag_name: $1
            metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.replicaset.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.node.name
            - k8s.node.uid
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.cluster.uid
            - k8s.container.name
            - container.id
            - service.namespace
            - service.name
            - service.version
            - service.instance.id
            otel_annotations: true
          passthrough: false
          pod_association:
          - sources:
            - from: resource_attribute
              name: k8s.pod.ip
          - sources:
            - from: resource_attribute
              name: k8s.pod.uid
          - sources:
            - from: connection
          wait_for_metadata: false
          wait_for_metadata_timeout: 10s
        memory_limiter:
          check_interval: 5s
          limit_percentage: 80
          spike_limit_percentage: 15
        resource/observe_common:
          attributes:
          - action: upsert
            key: k8s.cluster.name
            value: ${env:OBSERVE_CLUSTER_NAME}
          - action: upsert
            key: k8s.cluster.uid
            value: ${env:OBSERVE_CLUSTER_UID}
        transform/deployment_environment_compatability:
          error_mode: ignore
          log_statements:
          - set(resource.attributes["deployment.environment.name"], resource.attributes["deployment.environment"])
            where resource.attributes["deployment.environment.name"] == nil and resource.attributes["deployment.environment"]
            != nil
          - set(resource.attributes["deployment.environment"], resource.attributes["deployment.environment.name"])
            where resource.attributes["deployment.environment"] == nil and resource.attributes["deployment.environment.name"]
            != nil
          metric_statements:
          - set(resource.attributes["deployment.environment.name"], resource.attributes["deployment.environment"])
            where resource.attributes["deployment.environment.name"] == nil and resource.attributes["deployment.environment"]
            != nil
          - set(resource.attributes["deployment.environment"], resource.attributes["deployment.environment.name"])
            where resource.attributes["deployment.environment"] == nil and resource.attributes["deployment.environment.name"]
            != nil
          trace_statements:
          - set(resource.attributes["deployment.environment.name"], resource.attributes["deployment.environment"])
            where resource.attributes["deployment.environment.name"] == nil and resource.attributes["deployment.environment"]
            != nil
          - set(resource.attributes["deployment.environment"], resource.attributes["deployment.environment.name"])
            where resource.attributes["deployment.environment"] == nil and resource.attributes["deployment.environment.name"]
            != nil
        transform/set_debug_source:
          error_mode: ignore
          metric_statements:
          - context: resource
            statements:
            - set(attributes["debug_source"], "cadvisor_metrics") where attributes["service.name"]
              == "kubernetes-nodes-cadvisor"
            - set(attributes["debug_source"], "pod_metrics") where attributes["service.name"]
              != "kubernetes-nodes-cadvisor"
            - delete_key(attributes, "service.name") where attributes["service.name"] !=
              "kubernetes-nodes-cadvisor"
      receivers:
        prometheus/k8s_metrics:
          config:
            scrape_configs:
            - honor_labels: true
              job_name: pod-metrics
              kubernetes_sd_configs:
              - role: pod
              metric_relabel_configs:
              - action: drop
                regex: null
                source_labels:
                - __name__
              - action: keep
                regex: (.*)
                source_labels:
                - __name__
              relabel_configs:
              - action: keep
              - action: drop
                regex: (.*istio.*|.*ingress.*|kube-system)
                source_labels:
                - __meta_kubernetes_namespace
              - action: keep
                regex: (.*)
                source_labels:
                - __meta_kubernetes_namespace
              - action: keep
                regex: (.*metrics;|.*;\d+)
                source_labels:
                - __meta_kubernetes_pod_container_port_name
                - __meta_kubernetes_pod_annotation_prometheus_io_port
              - action: drop
                regex: Succeeded|Failed
                source_labels:
                - __meta_kubernetes_pod_phase
              - action: drop
                regex: "false"
                source_labels:
                - __meta_kubernetes_pod_annotation_observeinc_com_scrape
              - action: drop
                regex: "false"
                source_labels:
                - __meta_kubernetes_pod_annotation_prometheus_io_scrape
              - action: replace
                regex: (https?)
                replacement: $1
                source_labels:
                - __meta_kubernetes_pod_annotation_prometheus_io_scheme
                target_label: __scheme__
              - action: replace
                regex: (.+)
                replacement: $1
                source_labels:
                - __meta_kubernetes_pod_annotation_prometheus_io_path
                target_label: __metrics_path__
              - action: replace
                regex: (.+?)(\:\d+)?;(\d+)
                replacement: $1:$3
                source_labels:
                - __address__
                - __meta_kubernetes_pod_annotation_prometheus_io_port
                target_label: __address__
              - action: replace
                regex: (.+)
                source_labels:
                - __meta_kubernetes_pod_annotation_observeinc_com_path
                target_label: __metrics_path__
              - action: replace
                regex: ([^:]+)(?::\d+)?;(\d+)
                replacement: $1:$2
                source_labels:
                - __address__
                - __meta_kubernetes_pod_annotation_observeinc_com_port
                target_label: __address__
              - action: labelmap
                regex: __meta_kubernetes_pod_label_(.+)
              - action: replace
                source_labels:
                - __meta_kubernetes_namespace
                target_label: kubernetes_namespace
              - action: replace
                source_labels:
                - __meta_kubernetes_pod_name
                target_label: kubernetes_pod_name
              scrape_interval: 60s
            - bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              job_name: kubernetes-nodes-cadvisor
              kubernetes_sd_configs:
              - role: node
              relabel_configs:
              - replacement: kubernetes.default.svc:443
                target_label: __address__
              - regex: (.+)
                replacement: /api/v1/nodes/$$1/proxy/metrics/cadvisor
                source_labels:
                - __meta_kubernetes_node_name
                target_label: __metrics_path__
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true
      service:
        pipelines:
          metrics/k8s_metrics:
            exporters:
            - prometheusremotewrite/observe
            processors:
            - memory_limiter
            - transform/set_debug_source
            - k8sattributes
            - batch
            - resource/observe_common
            receivers:
            - prometheus/k8s_metrics
