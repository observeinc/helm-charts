---
# Source: agent/templates/prometheus-scraper-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-scraper
  namespace: observe
data:
  relay: |
      exporters:
        debug/override:
          sampling_initial: 2
          sampling_thereafter: 1
          verbosity: basic
        prometheusremotewrite/observe:
          endpoint: ${env:OBSERVE_PROMETHEUS_ENDPOINT}
          headers:
            authorization: ${env:OBSERVE_AUTHORIZATION_HEADER}
            x-observe-target-package: Kubernetes Explorer
          max_batch_request_parallelism: 5
          remote_write_queue:
            num_consumers: 5
          resource_to_telemetry_conversion:
            enabled: true
          retry_on_failure:
            enabled: true
            initial_interval: 1s
            max_elapsed_time: 5m
            max_interval: 30s
          send_metadata: true
          target_info:
            enabled: false
          timeout: 10s
      processors:
        batch:
          send_batch_max_size: 4096
          send_batch_size: 4096
          timeout: 5s
        k8sattributes:
          extract:
            labels:
            - from: pod
              key_regex: (app\.kubernetes\.io/.+)
              tag_name: $1
            metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.replicaset.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.node.name
            - k8s.node.uid
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.cluster.uid
            - k8s.container.name
            - container.id
            - service.namespace
            - service.name
            - service.version
            - service.instance.id
            otel_annotations: true
          passthrough: false
          pod_association:
          - sources:
            - from: resource_attribute
              name: k8s.pod.ip
          - sources:
            - from: resource_attribute
              name: k8s.pod.uid
          - sources:
            - from: connection
          wait_for_metadata: false
          wait_for_metadata_timeout: 10s
        memory_limiter:
          check_interval: 5s
          limit_percentage: 80
          spike_limit_percentage: 15
        resource/observe_common:
          attributes:
          - action: upsert
            key: k8s.cluster.name
            value: ${env:OBSERVE_CLUSTER_NAME}
          - action: upsert
            key: k8s.cluster.uid
            value: ${env:OBSERVE_CLUSTER_UID}
        transform/deployment_environment_compatability:
          error_mode: ignore
          log_statements:
          - set(resource.attributes["deployment.environment.name"], Coalesce([resource.attributes["deployment.environment.name"],
            resource.attributes["deployment.environment"]]))
          - set(resource.attributes["deployment.environment"], Coalesce([resource.attributes["deployment.environment"],
            resource.attributes["deployment.environment.name"]]))
          metric_statements:
          - set(resource.attributes["deployment.environment.name"], Coalesce([resource.attributes["deployment.environment.name"],
            resource.attributes["deployment.environment"]]))
          - set(resource.attributes["deployment.environment"], Coalesce([resource.attributes["deployment.environment"],
            resource.attributes["deployment.environment.name"]]))
          trace_statements:
          - set(resource.attributes["deployment.environment.name"], Coalesce([resource.attributes["deployment.environment.name"],
            resource.attributes["deployment.environment"]]))
          - set(resource.attributes["deployment.environment"], Coalesce([resource.attributes["deployment.environment"],
            resource.attributes["deployment.environment.name"]]))
        transform/set_debug_source:
          error_mode: ignore
          metric_statements:
          - context: resource
            statements:
            - set(attributes["debug_source"], "cadvisor_metrics") where attributes["service.name"]
              == "kubernetes-nodes-cadvisor"
            - set(attributes["debug_source"], "pod_metrics") where attributes["service.name"]
              != "kubernetes-nodes-cadvisor"
            - delete_key(attributes, "service.name") where attributes["service.name"] !=
              "kubernetes-nodes-cadvisor"
      receivers:
        prometheus/k8s_metrics:
          target_allocator:
            collector_id: ${env:OTEL_K8S_POD_NAME}
            endpoint: http://example-prometheus-ta-ta.observe.svc.cluster.local
            interval: 30s
      service:
        pipelines:
          metrics/k8s_metrics:
            exporters:
            - prometheusremotewrite/observe
            processors:
            - memory_limiter
            - transform/set_debug_source
            - k8sattributes
            - batch
            - resource/observe_common
            receivers:
            - prometheus/k8s_metrics
