---
# Source: agent/templates/prometheus-scraper-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-scraper
  namespace: observe
data:
  relay: |
      exporters:
        debug/override:
          sampling_initial: 2
          sampling_thereafter: 1
          verbosity: basic
        prometheusremotewrite/observe:
          endpoint: ${env:OBSERVE_PROMETHEUS_ENDPOINT}
          headers:
            authorization: ${env:OBSERVE_AUTHORIZATION_HEADER}
            x-observe-target-package: Kubernetes Explorer
          max_batch_request_parallelism: 5
          remote_write_queue:
            num_consumers: 5
          resource_to_telemetry_conversion:
            enabled: true
          retry_on_failure:
            enabled: true
            initial_interval: 1s
            max_elapsed_time: 5m
            max_interval: 30s
          send_metadata: true
          timeout: 10s
      processors:
        attributes/debug_source_cadvisor_metrics:
          actions:
          - action: insert
            key: debug_source
            value: cadvisor_metrics
        attributes/debug_source_pod_metrics:
          actions:
          - action: insert
            key: debug_source
            value: pod_metrics
        batch:
          send_batch_max_size: 4096
          send_batch_size: 4096
          timeout: 5s
        k8sattributes:
          extract:
            labels:
            - from: pod
              key_regex: (app\.kubernetes\.io/.+)
              tag_name: $1
            metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.replicaset.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.node.name
            - k8s.node.uid
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.cluster.uid
            - k8s.container.name
            - container.id
            - service.namespace
            - service.name
            - service.version
            - service.instance.id
            otel_annotations: true
          passthrough: false
          pod_association:
          - sources:
            - from: resource_attribute
              name: k8s.pod.ip
          - sources:
            - from: resource_attribute
              name: k8s.pod.uid
          - sources:
            - from: connection
          wait_for_metadata: false
          wait_for_metadata_timeout: 10s
        memory_limiter:
          check_interval: 5s
          limit_percentage: 80
          spike_limit_percentage: 15
        resource/drop_service_name:
          attributes:
          - action: delete
            key: service.name
        resource/observe_common:
          attributes:
          - action: upsert
            key: k8s.cluster.name
            value: ${env:OBSERVE_CLUSTER_NAME}
          - action: upsert
            key: k8s.cluster.uid
            value: ${env:OBSERVE_CLUSTER_UID}
      receivers:
        prometheus/cadvisor:
          target_allocator:
            collector_id: ${env:OTEL_K8S_POD_NAME}
            endpoint: http://example-prometheus-ta-cadvisor.observe.svc.cluster.local:8080
            interval: 30s
        prometheus/pod_metrics:
          target_allocator:
            collector_id: ${env:OTEL_K8S_POD_NAME}
            endpoint: http://example-prometheus-ta-pod-metrics.observe.svc.cluster.local:8080
            interval: 30s
      service:
        pipelines:
          metrics/cadvisor:
            exporters:
            - prometheusremotewrite/observe
            processors:
            - memory_limiter
            - k8sattributes
            - batch
            - resource/observe_common
            - attributes/debug_source_cadvisor_metrics
            receivers:
            - prometheus/cadvisor
          metrics/pod_metrics:
            exporters:
            - prometheusremotewrite/observe
            processors:
            - memory_limiter
            - resource/drop_service_name
            - k8sattributes
            - batch
            - resource/observe_common
            - attributes/debug_source_pod_metrics
            receivers:
            - prometheus/pod_metrics
