# Example: enable the merged prometheus/k8s_metrics pipeline for pod-metrics + cadvisor.
# In this PR the flag only merges the two receivers into one pipeline using
# transform/set_debug_source for routing. Target Allocator infrastructure lands
# in a follow-up PR.
observe:
  token:
    create: true

application:
  prometheusScrape:
    enabled: true
    independentDeployment: true

node:
  metrics:
    cadvisor:
      enabled: true
      separate_pipeline: false
