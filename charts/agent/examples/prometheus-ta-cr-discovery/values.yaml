# Example: TA discovers scrape targets from Prometheus Operator
# ServiceMonitor / PodMonitor CRDs (instead of the chart's static
# pod-annotation jobs). Requires Prometheus Operator CRDs in the cluster.
observe:
  token:
    create: true

application:
  prometheusScrape:
    enabled: true
    independentDeployment: true
    targetAllocator:
      enabled: true
      prometheusCR:
        enabled: true
        # Default scrape interval for discovered SMs/PMs that omit their own
        # `interval`. Without this, TA falls back to its built-in 30s.
        scrapeInterval: 60s
      includeStaticScrapeConfigs: false
