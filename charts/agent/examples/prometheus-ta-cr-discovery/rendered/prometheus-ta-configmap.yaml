---
# Source: agent/templates/prometheus-ta-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-ta
  namespace: observe
data:
  targetallocator.yaml: |
    allocation_strategy: consistent-hashing
    filter_strategy: relabel-config
    prometheus_cr:
      enabled: true
      # service_monitor_selector and pod_monitor_selector must be present
      # (even empty) — TA treats omitted label selectors as "match nothing".
      # Namespace selectors are only emitted when non-empty; TA defaults to
      # all-namespaces when they're absent.
      service_monitor_selector:
        {}
      pod_monitor_selector:
        {}
    collector_selector:
      matchlabels:
        app.kubernetes.io/name: prometheus-scraper
