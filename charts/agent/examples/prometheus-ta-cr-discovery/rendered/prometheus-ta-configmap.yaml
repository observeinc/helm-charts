---
# Source: agent/templates/prometheus-ta-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-ta
  namespace: observe
data:
  targetallocator.yaml: |
    allocation_strategy: consistent-hashing
    filter_strategy: relabel-config
    prometheus_cr:
      enabled: true
      # Empty selectors mean "match any". TA treats omitted selectors as
      # "match nothing", so always emit the empty form when CR discovery is on.
      service_monitor_selector: {}
      pod_monitor_selector: {}
    collector_selector:
      matchlabels:
        app.kubernetes.io/name: prometheus-scraper
