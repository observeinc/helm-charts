apiVersion: v2
name: agent
description: Chart to install K8s collection stack based on Observe Agent
type: application
version: 0.92.2
appVersion: "2.16.0"
dependencies:
  - name: opentelemetry-collector
    version: 0.143.0
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    alias: cluster-events
    condition: cluster.events.enabled
  - name: opentelemetry-collector
    version: 0.143.0
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    alias: cluster-metrics
    condition: cluster.metrics.enabled
  - name: opentelemetry-collector
    version: 0.143.0
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    alias: prometheus-scraper
    condition: application.prometheusScrape.independentDeployment
  # The OTel project releases this chart and opentelemetry-collector above
  # together, so their appVersions usually match. Patch versions can ship
  # independently for TA-specific fixes.
  - name: opentelemetry-target-allocator
    version: 0.128.1
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    alias: prometheus-ta
    condition: application.prometheusScrape.targetAllocator.enabled
  - name: opentelemetry-collector
    version: 0.143.0
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    alias: node-logs-metrics
    condition: node.enabled
  - name: opentelemetry-collector
    version: 0.143.0
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    alias: monitor
    condition: agent.selfMonitor.enabled
  - name: opentelemetry-collector
    version: 0.143.0
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    alias: forwarder
    condition: node.forwarder.enabled
  - name: opentelemetry-collector
    version: 0.143.0
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    alias: gateway
    condition: gatewayDeployment.enabled
maintainers:
  - name: Observe
    email: support@observeinc.com
