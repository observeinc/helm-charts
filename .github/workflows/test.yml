name: Test Charts

on: pull_request

jobs:
  lint-charts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          check-latest: true

      - name: Install chart-testing
        uses: helm/chart-testing-action@v2.7.0
        with:
          version: v3.8.0

      - name: Lint charts
        run: make lint

  test-charts-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        helm-major: [3, 4]
    name: test-charts (helm v${{ matrix.helm-major }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve Helm version
        id: helm-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          version=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/helm/helm/releases?per_page=100" | \
            grep -oP '"tag_name":\s*"v${{ matrix.helm-major }}\.\d+\.\d+"' | \
            head -1 | grep -oP 'v\d+\.\d+\.\d+')
          if [ -z "$version" ]; then
            echo "Failed to resolve latest helm v${{ matrix.helm-major }}.x release" >&2
            exit 1
          fi
          echo "Resolved helm version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ steps.helm-version.outputs.version }}

      - name: Install kind
        uses: helm/kind-action@v1.14.0
        with:
          install_only: true

      - name: Test charts
        run: make test GOBUILD=false

  test-charts:
    runs-on: ubuntu-latest
    needs: test-charts-matrix
    if: always()
    steps:
      - name: Aggregate matrix results
        run: |
          [ "${{ needs.test-charts-matrix.result }}" = "success" ] || exit 1
