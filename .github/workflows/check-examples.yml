name: Check Generated Examples

on: pull_request

jobs:
  check-examples:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.12.1

      - name: Add Helm repos
        run: make add-repos

      - name: Generate examples
        run: make generate-examples

      - name: Check for diff
        run: |
          git diff --exit-code || {
            echo "::error::Generated examples are out of date. Please run 'make generate-examples' and commit the result."
            exit 1
          }

      - name: Check for untracked files
        run: |
          UNTRACKED=$(git ls-files --others --exclude-standard)
          if [ -n "$UNTRACKED" ]; then
            echo "::error::Untracked example files found. Please run 'make generate-examples' and commit the result."
            echo "$UNTRACKED"
            exit 1
          fi
